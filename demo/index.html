<!doctype html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaPipe Gesture Recognition</title>
</head>
<html lang="en">
  <body
    style="
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px;
      margin: 0;
    "
  >
    <!-- Script that initializes the MediaPipe gesture recognition -->
    <script type="module" src="/src/main.ts"></script>

    <!-- Hidden video element for the webcam feed -->
    <video id="webcam" autoplay playsinline style="display: none"></video>

    <!-- Output canvas for displaying MediaPipe points -->
    <canvas id="output" style="width: 100%"></canvas>

    <pre id="log" style="background: #f5f5f5; margin: 0"></pre>
  </body>
</html>
